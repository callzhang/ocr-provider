services:
  api:
    build: .
    restart: unless-stopped
    gpus: all
    shm_size: ${SHM_SIZE:-2g}
    ports:
      - "${BIND_HOST}:${PORT}:8000"
    environment:
      SERVICE_NAME: ${SERVICE_NAME}
      OCR_PROVIDER: ${OCR_PROVIDER}
      OCR_MODEL: ${OCR_MODEL}
      OCR_MODEL_ALIAS: ${OCR_MODEL_ALIAS:-}
      API_KEY: ${API_KEY:-}
      OCR_LANGUAGES: ${OCR_LANGUAGES}
      OCR_DEVICE: ${OCR_DEVICE:-cpu}
      OCR_PARAGRAPH: ${OCR_PARAGRAPH:-true}
      OCR_MODEL_STORAGE_DIR: ${OCR_MODEL_STORAGE_DIR:-./runtime-cache/ocr}
      PDF_RENDER_SCALE: ${PDF_RENDER_SCALE:-2.0}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-}
      TESSERACT_CMD: ${TESSERACT_CMD:-}
    volumes:
      - ${OCR_MODEL_STORAGE_DIR:-./runtime-cache/ocr}:${OCR_MODEL_STORAGE_DIR:-/app/runtime-cache/ocr}
